* { box-sizing: border-box; margin: 0; padding: 0; -webkit-text-size-adjust: 100%; }

.search-wrap { position: relative; }
.search-wrap input { width: 100%; padding: 11px 40px 11px 14px; font-size: 16px; font-family: inherit; border: 1.5px solid #ccc; border-radius: 10px; background: #fafafa; color: #111; outline: none; -webkit-appearance: none; }

.clr { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: #bbb; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 11px; color: #fff; cursor: pointer; display: none; line-height: 20px; text-align: center; padding: 0; }

.flt { font-size: 13px; font-family: inherit; padding: 6px 13px; border-radius: 99px; border: 1px solid #ccc; background: #fff; color: #555; cursor: pointer; -webkit-tap-highlight-color: transparent; -webkit-appearance: none; white-space: nowrap; }
.flt.on { background: #222; border-color: #222; color: #fff; font-weight: 500; }
.stats { font-size: 13px; color: #888; padding: 10px 16px 6px; }
.list { padding: 0 16px 24px; display: flex; flex-direction: column; gap: 6px; }
.row { display: flex; align-items: center; gap: 8px; padding: 12px 14px; background: #fff; border-radius: 10px; border: 1px solid #e8e8e8; }
.name { flex: 1; font-size: 15px; font-weight: 500; color: #111; word-break: keep-all; min-width: 0; }
.region { font-size: 12px; color: #aaa; white-space: nowrap; }
.type { font-size: 11px; color: #bbb; white-space: nowrap; }
.badge { font-size: 12px; font-weight: 500; padding: 3px 9px; border-radius: 99px; white-space: nowrap; }
.sv0 { background: #deeefa; color: #0a4a80; }
.sv1 { background: #dff0e2; color: #1a5c28; }
.sv2 { background: #fdf0d8; color: #6b3a00; }
.sv3 { background: #fce8f2; color: #7a1f4a; }
.sv4 { background: #efefef; color: #444; }
mark { background: #ffd966; color: #333; border-radius: 2px; padding: 0 1px; }
.empty { text-align: center; color: #aaa; font-size: 14px; padding: 3rem 0; }
</style>

var curSV = '';
var composing = false;

function setSV(sv) {
  curSV = sv;
  var btns = document.querySelectorAll('.flt');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle('on', btns[i].getAttribute('data-sv') === sv);
  }
  render();
}

function clearQ() {
  document.getElementById('q').value = '';
  document.getElementById('clr').style.display = 'none';
  render();
}

function hl(text, q) {
  if (!q) return text;
  var idx = text.toLowerCase().indexOf(q.toLowerCase());
  if (idx === -1) return text;
  return text.slice(0, idx) + '<mark>' + text.slice(idx, idx + q.length) + '</mark>' + text.slice(idx + q.length);
}

function render() {
  var q = document.getElementById('q').value.trim();
  document.getElementById('clr').style.display = q ? 'block' : 'none';
  var list = DATA.slice();
  if (curSV) list = list.filter(function(d){ return d.sv === curSV; });
  if (q) list = list.filter(function(d){ return d.store.toLowerCase().indexOf(q.toLowerCase()) !== -1 || d.region.toLowerCase().indexOf(q.toLowerCase()) !== -1; });
  var statsEl = document.getElementById('stats');
  statsEl.textContent = (q || curSV) ? '검색 결과 ' + list.length + '개' : '전체 ' + list.length + '개 매장';
  var el = document.getElementById('list');
  if (!list.length) { el.innerHTML = '<div class="empty">검색 결과가 없습니다</div>'; return; }
  var html = '';
  for (var i = 0; i < list.length; i++) {
    var d = list[i];
    html += '<div class="row">';
    html += '<span class="name">' + hl(d.store, q) + '</span>';
    if (d.region) html += '<span class="region">' + hl(d.region, q) + '</span>';
    html += '<span class="type">' + d.type + '</span>';
    html += '<span class="badge ' + (SV_CLASS[d.sv]||'sv4') + '">' + d.sv + '</span>';
    html += '</div>';
  }
  el.innerHTML = html;
}

var btns = document.querySelectorAll('.flt');
for (var i = 0; i < btns.length; i++) {
  btns[i].addEventListener('click', (function(sv){ return function(){ setSV(sv); }; })(btns[i].getAttribute('data-sv')));
}

var inp = document.getElementById('q');
document.getElementById('clr').addEventListener('click', clearQ);

inp.addEventListener('compositionstart', function(){ composing = true; });
inp.addEventListener('compositionend', function(){ composing = false; render(); });
inp.addEventListener('input', function(){ if (!composing) render(); });
inp.addEventListener('keyup', function(){ if (!composing) render(); });
inp.addEventListener('change', function(){ render(); });

render();
</script>
